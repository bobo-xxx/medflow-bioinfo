schema: node-manifest@1.0

# Node registry — discovered by scanning nodes/ for SKILL.md.
# Used by compile-workflow to match protocol steps to available nodes.

nodes:
  geo-microarray-processing:
    source: git
    url: https://github.com/bobo-xxx/medflow-geo-microarray.git
    versions:
      - version: "1.0.0"
    description: "Fetch and process GEO microarray expression data with 5-tier fallback"
    subcommands: [validate-input, validate-output, fetch, qc, clean]
    produces: [probe_expression_matrix, gene_expression_matrix, sample_metadata_table, sample_group_assignment]
    file_layout:
      nesting: "{gse_id}/"

  batch-correction:
    source: git
    url: https://github.com/bobo-xxx/medflow-batch-correction.git
    versions:
      - version: "1.0.0"
    description: "Merge multiple gene expression datasets via intersection with always-on ComBat batch correction, boxplot, and PCA QC"
    subcommands: [intersect]
    consumes: [expression_matrix_gene]
    produces: [sample_metadata, expression_matrix_gene, visualization]
    file_discovery:
      recursive: true
      pattern: "expr_gene_*.csv"
      sidecar:
        - input_pattern: "expr_gene_*"
          companion_pattern: "metadata_*"
          needed_for: "shared_metadata.csv"

  univariate-filter:
    source: git
    url: https://github.com/bobo-xxx/medflow-univariate-filter.git
    versions:
      - version: "1.0.0"
    description: "Univariate association tests on each feature against an outcome variable — supports binary, multi-group, continuous, and survival outcomes"
    subcommands: [run]
    consumes: [expression_matrix, sample_outcome]
    produces: [univariate_results, univariate_results_significant, visualization]

  differential-analysis:
    source: git
    url: https://github.com/bobo-xxx/medflow-differential-analysis.git
    versions:
      - version: "1.0.0"
    description: "Differential expression analysis comparing case vs control groups"
    subcommands: [run, validate-input, validate-output]
    consumes: [expression_matrix, sample_metadata]
    produces: [differential_expression_results, filtered_degs, volcano_plot, heatmap_plot, venn_diagram, chromosome_location_plot]
    default_method: "auto"
    note: "Auto-detects: integer counts → DESeq2, normalized/log-transformed → limma. Override with --method to bypass detection."

  diagnostic-model:
    source: git
    url: https://github.com/bobo-xxx/medflow-diagnostic-model.git
    versions:
      - version: "1.0.0"
    description: "Multivariate logistic regression diagnostic model with LOOCV risk scores, forest plot, ROC, calibration, DCA, and serialized model output"
    subcommands: [train, valid, evaluate, visualize]
    consumes: [expression_matrix, group_mapping, gene_list]
    produces: [logistic_regression_results, risk_scores, forest_plot, logistic_model, roc_curve, calibration_plot, decision_curve]

  ml-feature-selection:
    source: git
    url: https://github.com/bobo-xxx/medflow-ml-feature-selection.git
    versions:
      - version: "1.0.0"
    description: "ML feature selection with sequential and parallel modes — Random Forest, LASSO, consensus intersection, and convergence gate"
    subcommands: [sequential, parallel]
    consumes: [expression_matrix, group_mapping]
    produces: [gene_list, feature_importance_table, diagnostic_plot, venn_diagram, gate_decision]

  go-kegg-enrichment:
    source: git
    url: https://github.com/bobo-xxx/medflow-go-kegg-enrichment.git
    versions:
      - version: "1.0.0"
    description: "GO (BP/CC/MF) and KEGG pathway enrichment analysis on gene symbol lists using Bioconductor clusterProfiler"
    subcommands: [enrich, merge, plot-bar, plot-bubble, plot-net, plot-emap]
    consumes: [gene_symbol_list, deg_results, go_enrichment_result_raw, kegg_enrichment_result_raw, merged_enrichment_table]
    produces: [go_enrichment_table, kegg_enrichment_table, go_enrichment_result_raw, kegg_enrichment_result_raw, merged_enrichment_table, bar_plot, bubble_plot, cnet_plot, emap_plot]
    file_discovery:
      recursive: false
      pattern: "*.csv"
    note: "KEGG outputs are conditional on API availability; node tolerates their absence"
