    url: https://github.com/bioinfo-skillful/medflow-diagnostic-model.git
    versions:
      - version: "1.0.0"

  univariate-filter:
    source: git
    url: https://github.com/bioinfo-skillful/medflow-univariate-filter.git
    versions:
      - version: "1.0.0"

  ml-feature-selection:
