schema: registry@1.0

# Machine-readable node registry — git clone URLs + versions.
# Used by MedFlow compile/run skills to clone node contracts and implementations.
# Each version must have a canonical v<version> Git tag. Compilation resolves
# that tag and persists its dereferenced commit SHA for audit and execution.
# Node capabilities and parameters are read from each cloned node's SKILL.md.

nodes:
  geo-microarray-processing:
    source: git
    url: https://github.com/bioinfo-skillful/medflow-geo-microarray.git
    versions:
      - version: "1.4.0"

  batch-correction:
